<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Kakao REST Test</title>
</head>
<body>

<h3>카카오 메시지 테스트</h3>

API KEY<br>
<input id="key" style="width:400px"><br><br>

TITLE<br>
<input id="title" value="테스트 메시지"><br><br>

DESCRIPTION<br>
<input id="desc" value="설명입니다"><br><br>

IMAGE URL<br>
<input id="img" value="https://via.placeholder.com/800x400.png"><br><br>

컨텐츠 링크 URL<br>
<input id="contentLink" value="https://example.com"><br><br>

버튼 링크 URL<br>
<input id="buttonLink" value="https://example.com"><br><br>

<button onclick="login()">1회 로그인</button>
<button onclick="send()">메시지 보내기</button>

<script>
function val(id){ return document.getElementById(id).value }

function login(){
  const key = val("key")
  const uri = location.origin + location.pathname

  location.href =
    "https://kauth.kakao.com/oauth/authorize?client_id=" +
    key +
    "&redirect_uri=" + encodeURIComponent(uri) +
    "&response_type=code&scope=talk_message"
}

async function getToken(code){
  const key = val("key")
  const uri = location.origin + location.pathname

  const res = await fetch("https://kauth.kakao.com/oauth/token", {
    method:"POST",
    headers:{ "Content-Type":"application/x-www-form-urlencoded" },
    body:
      "grant_type=authorization_code"+
      "&client_id="+key+
      "&redirect_uri="+encodeURIComponent(uri)+
      "&code="+code
  })

  const d = await res.json()
  localStorage.setItem("at", d.access_token)
  localStorage.setItem("rt", d.refresh_token)
}

async function refresh(){
  const key = val("key")
  const rt = localStorage.getItem("rt")

  const res = await fetch("https://kauth.kakao.com/oauth/token", {
    method:"POST",
    headers:{ "Content-Type":"application/x-www-form-urlencoded" },
    body:
      "grant_type=refresh_token"+
      "&client_id="+key+
      "&refresh_token="+rt
  })

  const d = await res.json()
  localStorage.setItem("at", d.access_token)
  if(d.refresh_token) localStorage.setItem("rt", d.refresh_token)
  return d.access_token
}

async function send(){
  let token = localStorage.getItem("at")
  if(!token) token = await refresh()

  const contentLink = val("contentLink")
  const buttonLink = val("buttonLink")

  const template = {
    object_type:"feed",
    content:{
      title: val("title"),
      description: val("desc"),
      image_url: val("img"),
      link:{
        web_url: contentLink,
        mobile_web_url: contentLink
      }
    },
    buttons:[{
      title:"열기",
      link:{
        web_url: buttonLink,
        mobile_web_url: buttonLink
      }
    }]
  }

  await fetch("https://kapi.kakao.com/v2/api/talk/memo/default/send",{
    method:"POST",
    headers:{
      Authorization:"Bearer "+token,
      "Content-Type":"application/x-www-form-urlencoded"
    },
    body:"template_object="+encodeURIComponent(JSON.stringify(template))
  })

  alert("전송 완료")
}

// 로그인 후 code 처리
const code = new URLSearchParams(location.search).get("code")
if(code){
  getToken(code).then(()=>{
    history.replaceState({}, "", location.pathname)
    alert("로그인 완료")
  })
}
</script>

</body>
</html>
