<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Kakao REST Test</title>
</head>
<body>
  <button onclick="login()">처음 1회 로그인</button>
  <button onclick="send()">메시지 보내기</button>

  <script>
    const REST_API_KEY = "fe1dd7003cd4ab68607b81bb5079fdfa";
    const REDIRECT_URI = location.origin + location.pathname;

    function login() {
      location.href =
        "https://kauth.kakao.com/oauth/authorize?client_id=" +
        REST_API_KEY +
        "&redirect_uri=" +
        encodeURIComponent(REDIRECT_URI) +
        "&response_type=code&scope=talk_message";
    }

    async function getTokenByCode(code) {
      const res = await fetch("https://kauth.kakao.com/oauth/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded;charset=utf-8" },
        body:
          "grant_type=authorization_code" +
          "&client_id=" + REST_API_KEY +
          "&redirect_uri=" + encodeURIComponent(REDIRECT_URI) +
          "&code=" + code
      });
      const data = await res.json();
      localStorage.setItem("access_token", data.access_token);
      localStorage.setItem("refresh_token", data.refresh_token);
    }

    async function refreshAccessToken() {
      const refreshToken = localStorage.getItem("refresh_token");
      const res = await fetch("https://kauth.kakao.com/oauth/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded;charset=utf-8" },
        body:
          "grant_type=refresh_token" +
          "&client_id=" + REST_API_KEY +
          "&refresh_token=" + refreshToken
      });
      const data = await res.json();
      localStorage.setItem("access_token", data.access_token);
      if (data.refresh_token) {
        localStorage.setItem("refresh_token", data.refresh_token);
      }
      return data.access_token;
    }

    async function sendMessage(token) {
      const template = {
        object_type: "feed",
        content: {
          title: "선물 드립니다.",
          description: "",
          image_url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ1ITZFSBm-ASA0o2U-vSSnl_D6AYUlEYmgpg&s",
          link: {
            web_url: "https://example.com",
            mobile_web_url: "https://example.com"
          }
        },
        buttons: [
          {
            title: "선물 받기",
            link: {
              web_url: "https://sites.google.com/view/snuaprilfoolsday/%ED%99%88",
              mobile_web_url: "https://sites.google.com/view/snuaprilfoolsday/%ED%99%88"
            }
          }
        ]
      };

      await fetch("https://kapi.kakao.com/v2/api/talk/memo/default/send", {
        method: "POST",
        headers: {
          Authorization: "Bearer " + token,
          "Content-Type": "application/x-www-form-urlencoded;charset=utf-8"
        },
        body: "template_object=" + encodeURIComponent(JSON.stringify(template))
      });

      alert("전송 완료");
    }

    async function send() {
      let token = localStorage.getItem("access_token");
      if (!token && localStorage.getItem("refresh_token")) {
        token = await refreshAccessToken();
      }
      await sendMessage(token);
    }

    const code = new URLSearchParams(location.search).get("code");
    if (code) {
      getTokenByCode(code).then(() => {
        history.replaceState({}, "", REDIRECT_URI);
        alert("로그인 완료");
      });
    }
  </script>
</body>
</html>
